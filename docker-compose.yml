version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: coach-postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secret_password
      POSTGRES_DB: ai_career_coach
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coach-fastapi-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_secret_password
      - POSTGRES_DB=ai_career_coach
      - SECRET_KEY=YOUR_GENERATED_32_BYTES_RANDOM_SECRET_KEY_FOR_JWT_SECURITY_ENCRYPTION
      - ACCESS_TOKEN_EXPIRE_MINUTES=11520
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
